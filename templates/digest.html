{% extends "base.html" %}{% block title %}Digest — FangTrack Pro{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 style="font-size:20px; font-weight:900; letter-spacing:-.02em;">📄 Daily Digest</h1>
  <div style="font-size:12px; color:#555;">{{ digest_path }}</div>
</div>
<div class="card">
  <pre style="white-space:pre-wrap; font-family:monospace; font-size:13px; color:#e0e0e0; line-height:1.7;">{{ content }}</pre>
</div>
{% endblock %}
