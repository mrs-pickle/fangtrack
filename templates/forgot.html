{% extends "base.html" %}{% block title %}Reset password — FangTrack{% endblock %}
{% block content %}
<div style="max-width:400px; margin:50px auto;">
  <h1 style="font-size:22px; font-weight:900; letter-spacing:-.02em; margin:0 0 6px; text-align:center;">Reset your password</h1>
  <p style="color:var(--muted); font-size:13px; text-align:center; margin:0 0 24px;">Enter your account email and we'll send you a reset link.</p>
  <div class="card">
    <form method="post" class="flex flex-col gap-3">
      <div>
        <label style="font-size:10px; color:#2563eb; letter-spacing:.1em; display:block; margin-bottom:4px;">EMAIL</label>
        <input name="email" type="email" required autofocus placeholder="you@email.com"
               style="width:100%; box-sizing:border-box; font-size:15px; padding:11px 14px;">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:4px;">Send reset link</button>
    </form>
  </div>
  <p style="color:var(--muted); font-size:13px; text-align:center; margin-top:16px;">
    Remembered it? <a href="/login" style="color:#2563eb;">Back to sign in →</a>
  </p>
</div>
{% endblock %}
