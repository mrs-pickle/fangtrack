name: CI

# Runs the test suite on every push and PR. Branch protection on `main` uses this
# as a required check, so code that fails tests can't reach production.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches Render's PYTHON_VERSION
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -q
