# Render Blueprint for FangTrack. In the Render dashboard: New → Blueprint → point at
# this repo. See DEPLOY.md for the SQLite-vs-Postgres decision.
#
# This blueprint provisions Postgres + a separate crawler Cron Job (the clean, scalable
# setup). For a quick SQLite-on-a-disk beta instead, comment out the `databases` block and
# the cron service, drop `DATABASE_URL`, and add a disk (see the commented block below).
databases:
  - name: fangtrack-db
    plan: free                          # Render Postgres free tier

services:
  - type: web
    name: fangtrack
    runtime: python
    # IMPORTANT: the blueprint's `plan` overrides the dashboard Instance Type on every
    # sync. Keep this at `standard` (1 CPU / 2 GB) — a `starter` here silently reverts
    # a manual upgrade on the next push and reintroduces the 0.5-CPU health-check flap.
    plan: standard
    buildCommand: "pip install -r requirements.txt"
    # 512MB (starter) fits ONE worker: the snapshot build transiently loads ~75k rows
    # for rarity/trends, and two workers doing that at once OOM'd the instance. One
    # worker + threads also means a single SHARED snapshot cache (no per-worker dupes).
    # --max-requests recycles the worker periodically to release accumulated memory.
    # 1 worker (see memory note above) but 8 threads: bot crawlers (ClaudeBot &c.)
    # hammer heavy pages (/species/*, /history) and a burst can tie up every thread
    # on slow free-Postgres I/O, starving the /healthz probe → 5s-timeout flap +
    # Render "server failure" alert (2026-07-20 incident). More threads = the probe
    # can still find a free one. Memory has huge headroom (~15% of 2GB) so this is safe.
    startCommand: "gunicorn wsgi:app --workers 1 --threads 8 --timeout 120 --max-requests 500 --max-requests-jitter 50 --bind 0.0.0.0:$PORT"
    healthCheckPath: /healthz
    envVars:
      - key: FANGTRACK_SECRET_KEY
        generateValue: true
      - key: FANGTRACK_HTTPS
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL               # Postgres backend (database/pg.py activates)
        fromDatabase:
          name: fangtrack-db
          property: connectionString
      - key: FANGTRACK_BASE_URL         # absolute URLs in password-reset emails
        value: "https://fangtrack.com"
      - key: FANGTRACK_PROXY_HOPS       # Render sits behind 1 proxy → real client IP
        value: "1"
      - key: NOTIFY_EMAIL               # where /submit form reports are emailed
        value: "mike@fangtrack.com"
      # SMTP for password-reset + watchlist/digest email. Render will PROMPT for
      # these at blueprint creation (sync:false = not stored in the repo). Leave
      # blank to launch without email — reset links then just log server-side.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # Daily crawl as its own worker, sharing the Postgres DB. Set the schedule you want.
  - type: cron
    name: fangtrack-crawl
    runtime: python
    schedule: "0 9 * * *"               # 09:00 UTC daily
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scheduled_crawl.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fangtrack-db
          property: connectionString
      # SMTP so the nightly crawl can email the watchlist digest (optional).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL               # daily watchlist digest recipient
        value: "mike@fangtrack.com"

# ── SQLite-on-a-disk alternative (simpler, no Postgres) ──────────────────────
# Remove the `databases:` block, the DATABASE_URL env vars, and the cron service above,
# then give the web service a disk and point the DB at it:
#     envVars:
#       - key: FANGTRACK_DB_PATH
#         value: "/data/market_history.sqlite"
#     disk:
#       name: fangtrack-data
#       mountPath: /data
#       sizeGB: 1
# (With SQLite the crawler can't be a separate service — use the in-process
#  FANGTRACK_DAILY_CRAWL_HOUR scheduler on an always-on plan instead.)
